<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root{
      --bg:#ffffff; --fg:#1b1b1b; --muted:#555;
      --field-bg:#ffffff; --field-fg:#1b1b1b; --border:#cccccc;
      --switch-off:#c4c9d0; --switch-on:#2f7bd6;
    }
    body.dark{
      --bg:#1f2430; --fg:#e3e7ee; --muted:#9aa3b2;
      --field-bg:#2a313e; --field-fg:#e3e7ee; --border:#3a4150;
      --switch-off:#3a4150; --switch-on:#2f7bd6;
    }
    body{font-family:system-ui,Arial,sans-serif;width:262px;padding:14px;margin:0;background:var(--bg);color:var(--fg)}
    .hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    h1{font-size:15px;margin:0;display:flex;align-items:center;gap:8px}
    h1 img{width:22px;height:22px;display:block}
    p{font-size:12px;color:var(--muted);margin:0 0 12px;line-height:1.45}
    label.field-label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}
    select{width:100%;padding:8px;font-size:14px;border:1px solid var(--border);border-radius:6px;background:var(--field-bg);color:var(--field-fg)}
    .saved{font-size:12px;color:#0a8a0a;height:16px;margin-top:8px}
    body.dark .saved{color:#5fd17a}
    .row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
    .row span{font-size:13px;font-weight:600}
    .switch{position:relative;display:inline-block;width:42px;height:24px;flex:0 0 auto}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;inset:0;background:var(--switch-off);border-radius:24px;transition:.2s}
    .slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
    .switch input:checked + .slider{background:var(--switch-on)}
    .switch input:checked + .slider:before{transform:translateX(18px)}
  </style>
</head>
<body>
  <div class="hdr">
    <h1><img src="icons/icon-32.png" alt="">Atlas</h1>
  </div>
  <p>Pick your exam. The buttons on the UWorld results page will search your AnKing tags for that Step. No page refresh needed.</p>
  <label class="field-label" for="sv">Exam</label>
  <select id="sv">
    <option value="1">Step 1 / COMLEX 1</option>
    <option value="2">Step 2 / COMLEX 2</option>
    <option value="3">Step 3</option>
  </select>
  <div class="saved" id="saved"></div>
  <div class="row">
    <span>Dark mode</span>
    <label class="switch">
      <input type="checkbox" id="darkToggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="row" style="margin-top:10px;padding-top:10px;">
    <span>Expected Score <span style="font-weight:400;color:var(--color-text-tertiary,#999);font-size:11px;">(Beta)</span></span>
    <label class="switch">
      <input type="checkbox" id="esToggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="row" style="margin-top:10px;padding-top:10px;">
    <span>Easy mode <span style="font-weight:400;color:var(--muted);font-size:11px;">(auto-unsuspend)</span></span>
    <label class="switch">
      <input type="checkbox" id="easyToggle">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
